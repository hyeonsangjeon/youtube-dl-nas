name: Docker Image

on:
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "Auth.json"
      - "requirements.txt"
      - "run.sh"
      - "subber"
      - "upd_schedule.py"
      - "youtube-dl-server.py"
      - "bottle_websocket/**"
      - "static/**"
      - ".github/workflows/docker.yml"
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
      - "*.*.*"
      - "[0-9][0-9].[0-9][0-9][0-9][0-9]"
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "Auth.json"
      - "requirements.txt"
      - "run.sh"
      - "subber"
      - "upd_schedule.py"
      - "youtube-dl-server.py"
      - "compose.yaml"
      - "bottle_websocket/**"
      - "static/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: modenaf360/youtube-dl-nas
  GHCR_IMAGE: ghcr.io/hyeonsangjeon/youtube-dl-nas

jobs:
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
