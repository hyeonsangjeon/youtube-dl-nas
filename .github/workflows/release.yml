name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9][0-9].[0-9][0-9][0-9][0-9]"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          integrations/http-shortcuts/youtube-dl-nas-http-shortcut.zip
          integrations/apple-shortcuts/Download-to-NAS.shortcut
          --generate-notes
          --title "youtube-dl-nas $GITHUB_REF_NAME"
